<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>舞光 LED 產品 RAG 查詢</title>
<style>
/* ── design tokens (ui-design plugin spec) ──────────────────────────── */
:root {
  /* palette */
  --c-bg: #f6f7fb;
  --c-surface: #ffffff;
  --c-surface-muted: #f2f4f8;
  --c-ink-900: #0f172a;
  --c-ink-700: #334155;
  --c-ink-500: #64748b;
  --c-ink-400: #94a3b8;
  --c-border: #e2e8f0;
  --c-border-strong: #cbd5e1;

  --c-primary: #2563eb;
  --c-primary-hover: #1d4ed8;
  --c-primary-soft: #eff4ff;

  --c-accent: #f59e0b;
  --c-accent-soft: #fff7ed;
  --c-warn: #b45309;
  --c-warn-soft: #fef3c7;

  --c-success: #16a34a;
  --c-error: #dc2626;

  /* typography */
  --font-sans: "Inter", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei",
               system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --fs-xs: 0.75rem;   --fs-sm: 0.875rem; --fs-base: 1rem;
  --fs-lg: 1.125rem;  --fs-xl: 1.25rem;  --fs-2xl: 1.5rem;
  --fs-3xl: clamp(1.5rem, 2.2vw + 1rem, 2rem);

  /* 8-pt spacing scale */
  --s-1: .25rem; --s-2: .5rem;  --s-3: .75rem; --s-4: 1rem;
  --s-5: 1.25rem; --s-6: 1.5rem; --s-8: 2rem;   --s-10: 2.5rem;

  /* shape & motion */
  --r-sm: .375rem; --r-md: .5rem; --r-lg: .75rem; --r-xl: 1rem;
  --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-2: 0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.05);
  --shadow-3: 0 12px 32px rgba(15,23,42,.12), 0 4px 10px rgba(15,23,42,.08);
  --motion: 160ms cubic-bezier(.2,.7,.3,1);
}

/* ── base ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { color-scheme: light; }
body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: 1.55;
  color: var(--c-ink-900);
  background:
    radial-gradient(1200px 600px at 10% -10%, #e8efff 0%, transparent 60%),
    radial-gradient(900px 500px at 100% 0%, #fff3e0 0%, transparent 55%),
    var(--c-bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button, input { font: inherit; color: inherit; }
a { color: var(--c-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── layout ─────────────────────────────────────────────────────────── */
.page {
  /* Content roughly centered, nudged ~80px to the left of true center.
     Tooltips fly to the LEFT of the card; the larger left-side space
     ensures they fit on wide monitors. */
  max-width: 720px;
  margin-inline-start: clamp(var(--s-6), calc(50vw - 440px), calc(100vw - 760px));
  margin-inline-end: auto;
  padding-inline: var(--s-6);
  padding-block: var(--s-10) var(--s-8);
}
.hero { margin-block-end: var(--s-6); }
.eyebrow {
  display: inline-flex; align-items: center; gap: var(--s-2);
  padding: var(--s-1) var(--s-3);
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: 999px; font-size: var(--fs-xs); color: var(--c-ink-500);
  box-shadow: var(--shadow-1);
}
.eyebrow .dot {
  width: .5rem; height: .5rem; border-radius: 999px;
  background: var(--c-success);
  box-shadow: 0 0 0 3px rgba(22,163,74,.18);
}
h1 {
  margin: var(--s-3) 0 var(--s-2);
  font-size: var(--fs-3xl);
  line-height: 1.15;
  letter-spacing: -0.01em;
}
.sub {
  margin: 0;
  max-width: 65ch;
  color: var(--c-ink-500);
  font-size: var(--fs-sm);
}
.sub code {
  background: var(--c-surface-muted);
  border: 1px solid var(--c-border);
  padding: .1rem .35rem; border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: .8em;
}

/* ── search ─────────────────────────────────────────────────────────── */
.searchbar {
  display: flex; gap: var(--s-3);
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  padding: var(--s-2);
  box-shadow: var(--shadow-2);
  margin-block-start: var(--s-6);
  transition: border-color var(--motion), box-shadow var(--motion);
}
.searchbar:focus-within {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 4px rgba(37,99,235,.12), var(--shadow-2);
}
.searchbar .icon {
  display: grid; place-items: center; width: 2.5rem;
  color: var(--c-ink-400);
}
#q {
  flex: 1; min-width: 0;
  border: 0; outline: 0; background: transparent;
  padding-block: var(--s-3); padding-inline: 0;
  font-size: var(--fs-base);
}
#q::placeholder { color: var(--c-ink-400); }
.btn {
  appearance: none; border: 0; cursor: pointer;
  display: inline-flex; align-items: center; gap: var(--s-2);
  padding: var(--s-3) var(--s-5);
  background: var(--c-primary); color: #fff;
  border-radius: var(--r-lg);
  font-weight: 600; font-size: var(--fs-sm);
  transition: background var(--motion), transform var(--motion), box-shadow var(--motion);
  box-shadow: 0 6px 16px -4px rgba(37,99,235,.45);
}
.btn:hover:not(:disabled) { background: var(--c-primary-hover); }
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { background: var(--c-ink-400); cursor: wait; box-shadow: none; }
.btn:focus-visible {
  outline: 2px solid var(--c-primary);
  outline-offset: 2px;
}

.examples {
  display: flex; flex-wrap: wrap; gap: var(--s-2);
  margin-block: var(--s-4) 0;
  font-size: var(--fs-sm);
}
.examples .label { color: var(--c-ink-500); align-self: center; }
.chip {
  display: inline-flex; align-items: center;
  padding: var(--s-1) var(--s-3);
  background: var(--c-surface); color: var(--c-ink-700);
  border: 1px solid var(--c-border);
  border-radius: 999px;
  font-size: var(--fs-xs); cursor: pointer;
  transition: background var(--motion), border-color var(--motion), color var(--motion);
}
.chip:hover, .chip:focus-visible {
  background: var(--c-primary-soft); border-color: var(--c-primary);
  color: var(--c-primary); outline: none;
}

/* ── results ────────────────────────────────────────────────────────── */
.results {
  display: grid; gap: var(--s-4);
  margin-block-start: var(--s-6);
}
.card {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  column-gap: var(--s-4); align-items: center;
  padding: var(--s-5);
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  cursor: pointer;
  transition: border-color var(--motion), box-shadow var(--motion), transform var(--motion);
}
.card:hover, .card:focus-visible {
  border-color: var(--c-primary);
  box-shadow: var(--shadow-2);
  outline: none;
  transform: translateY(-1px);
}
.card.recommended {
  border-color: var(--c-accent);
  background: linear-gradient(180deg, #fff8ec 0%, #fff 60%);
}
.card.nomatch {
  border-color: #fde68a;
  background: var(--c-accent-soft);
}

.rank {
  flex-shrink: 0;
  min-width: 4.5rem; height: 2.5rem;
  display: inline-flex; align-items: center; justify-content: center;
  padding-inline: var(--s-3);
  background: var(--c-primary); color: #fff;
  border-radius: var(--r-md);
  font-weight: 700; font-size: var(--fs-sm);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.card.recommended .rank { background: var(--c-accent); }
.card.nomatch .rank    { background: var(--c-warn); }

.card .body { min-width: 0; }
.card .title {
  font-weight: 600; font-size: var(--fs-lg);
  line-height: 1.3; letter-spacing: -0.005em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card .reason {
  margin-block-start: var(--s-2);
  color: var(--c-ink-700); font-size: var(--fs-sm);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card.recommended .reason { color: var(--c-warn); font-weight: 500; }
.card .reason::before {
  content: "▸ ";
  color: var(--c-ink-400);
}
.card.recommended .reason::before { color: var(--c-accent); }
.card .meta {
  margin-block-start: var(--s-1);
  color: var(--c-ink-500); font-size: var(--fs-sm);
  display: flex; flex-wrap: wrap; gap: var(--s-2) var(--s-4);
}
.card .meta .k { color: var(--c-ink-400); margin-inline-end: var(--s-1); }
.card .meta b { color: var(--c-ink-700); font-weight: 600; }
.card .meta .pill {
  display: inline-flex; align-items: center; gap: var(--s-1);
  padding: 2px var(--s-2); border-radius: 999px;
  background: var(--c-surface-muted); color: var(--c-ink-700);
  font-size: var(--fs-xs);
}
.card .models-row {
  margin-block-start: var(--s-2);
  display: flex; flex-wrap: wrap; gap: var(--s-1) var(--s-2);
  align-items: center;
  font-size: var(--fs-xs);
}
.card .models-row .k {
  color: var(--c-ink-400); margin-inline-end: var(--s-1);
}
.card .models-row .model-pill {
  display: inline-flex; align-items: center;
  padding: 2px var(--s-2); border-radius: var(--r-sm);
  background: var(--c-primary-soft); color: var(--c-primary);
  border: 1px solid #dbe6fb;
  font-family: var(--font-mono); font-size: var(--fs-xs);
  font-weight: 600;
}
.card .models-row .more {
  color: var(--c-ink-500); font-size: var(--fs-xs);
}

.score {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: flex-end;
  color: var(--c-ink-400); font-size: var(--fs-xs);
  gap: 2px;
}
.score b {
  color: var(--c-ink-700); font-size: var(--fs-xs);
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}
.score b::before {
  content: "💡"; font-size: 0.95rem;
}
.score .hint { color: var(--c-ink-400); font-size: var(--fs-xs); }

/* ── tooltip (hover popover) ───────────────────────────────────────── */
.tooltip {
  position: absolute;
  inset-inline-start: calc(100% + 14px);
  inset-inline-end: auto;
  inset-block-start: 0;
  width: 540px; max-width: calc(100vw - 100% - 60px);
  padding: var(--s-5);
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-3);
  z-index: 20;
  opacity: 0; pointer-events: none;
  transform: translateX(-4px);
  transition: opacity var(--motion), transform var(--motion);
}
/* Bridge between the card's right edge and the tooltip's left edge so the
   cursor doesn't break the hover when crossing the 14px gap. */
.tooltip::before {
  content: "";
  position: absolute;
  inset-inline-start: -16px; inset-inline-end: auto;
  inset-block-start: 0;
  width: 16px; height: 100%;
  background: transparent;
}
.model-list {
  display: flex; flex-wrap: wrap; gap: var(--s-1) var(--s-2);
}
.model-list .model-pill {
  display: inline-flex; align-items: center;
  padding: 2px var(--s-2); border-radius: var(--r-sm);
  background: var(--c-surface-muted); color: var(--c-ink-700);
  font-family: var(--font-mono); font-size: var(--fs-xs);
  border: 1px solid var(--c-border);
}
.card:hover .tooltip,
.card:focus-within .tooltip,
.tooltip:hover {
  opacity: 1; pointer-events: auto;
  transform: translateX(0);
}
.tooltip h3 {
  margin: 0 0 var(--s-3);
  font-size: var(--fs-sm); font-weight: 600;
  color: var(--c-ink-500); text-transform: uppercase;
  letter-spacing: 0.05em;
}
.spec-grid {
  display: grid; grid-template-columns: auto 1fr;
  column-gap: var(--s-4); row-gap: var(--s-2);
  font-size: var(--fs-sm);
}
.spec-grid dt {
  color: var(--c-primary); font-weight: 600; white-space: nowrap;
}
.spec-grid dd {
  margin: 0; color: var(--c-ink-700);
  word-break: break-word;
}
.tooltip figure {
  margin: var(--s-4) 0 0;
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  background: var(--c-surface-muted);
  overflow: hidden;
}
.tooltip figure img { display: block; width: 100%; height: auto; }
.tooltip figcaption {
  font-size: var(--fs-xs); color: var(--c-ink-500);
  padding: var(--s-1) var(--s-2); text-align: end;
}

/* ── states ─────────────────────────────────────────────────────────── */
.placeholder, .loading, .error {
  margin-block-start: var(--s-6);
  padding: var(--s-5) var(--s-6);
  background: var(--c-surface);
  border: 1px dashed var(--c-border-strong);
  border-radius: var(--r-lg);
  color: var(--c-ink-500);
  font-size: var(--fs-sm);
  text-align: center;
}
.loading { border-style: solid; color: var(--c-ink-700); }
.loading::before {
  content: ""; display: inline-block;
  width: .9rem; height: .9rem; margin-inline-end: var(--s-2);
  border: 2px solid var(--c-border-strong);
  border-top-color: var(--c-primary);
  border-radius: 999px;
  animation: spin .9s linear infinite;
  vertical-align: -2px;
}
.error {
  background: #fef2f2; border-color: #fecaca; color: var(--c-error);
  border-style: solid;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; inset-block-end: var(--s-6);
  inset-inline-start: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--c-ink-900); color: #fff;
  padding: var(--s-3) var(--s-5);
  border-radius: var(--r-md); font-size: var(--fs-sm);
  box-shadow: var(--shadow-3);
  opacity: 0; transition: opacity var(--motion), transform var(--motion);
  pointer-events: none;
}
.toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ── PDF page viewer modal ──────────────────────────────────────────── */
.pdf-modal {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(15, 23, 42, 0.78);
  backdrop-filter: blur(4px);
  z-index: 1000;
}
.pdf-modal.show { display: flex; }
.pdf-modal-inner {
  position: relative;
  background: #fff;
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-3);
  max-width: min(94vw, 1100px);
  max-height: 94vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.pdf-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-5);
  background: var(--c-surface-muted);
  border-bottom: 1px solid var(--c-border);
}
.pdf-toolbar-group { display: flex; align-items: center; gap: var(--s-2); }
.pdf-nav {
  appearance: none; border: 1px solid var(--c-border);
  background: var(--c-surface); cursor: pointer;
  width: 2.25rem; height: 2.25rem;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  color: var(--c-ink-700);
  transition: background var(--motion), border-color var(--motion);
}
.pdf-nav:hover:not(:disabled) {
  background: var(--c-primary-soft); border-color: var(--c-primary); color: var(--c-primary);
}
.pdf-nav:disabled { opacity: 0.4; cursor: not-allowed; }
.pdf-pageno {
  font-variant-numeric: tabular-nums;
  font-size: var(--fs-sm); color: var(--c-ink-700);
  padding: 0 var(--s-3);
  min-width: 7rem; text-align: center;
}
.pdf-pageno input {
  width: 3.5rem; text-align: center;
  border: 1px solid var(--c-border); border-radius: var(--r-sm);
  padding: 2px 4px;
  font: inherit;
}
.pdf-close {
  appearance: none; border: 0; background: transparent;
  cursor: pointer; padding: 0;
  width: 2.25rem; height: 2.25rem;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  color: var(--c-ink-700);
  font-size: 1.2rem;
}
.pdf-close:hover { background: var(--c-surface-muted); color: var(--c-ink-900); }
.pdf-stage {
  flex: 1; min-height: 0;
  overflow: auto;
  background: var(--c-bg);
  padding: var(--s-4);
  display: flex; justify-content: center; align-items: flex-start;
}
.pdf-stage img {
  display: block;
  max-width: 100%;
  height: auto;
  box-shadow: var(--shadow-2);
  background: #fff;
}
.tooltip figure img { cursor: zoom-in; }
.pdf-spinner {
  position: absolute; inset-block-start: 50%; inset-inline-start: 50%;
  transform: translate(-50%, -50%);
  width: 2rem; height: 2rem;
  border: 3px solid var(--c-border);
  border-top-color: var(--c-primary);
  border-radius: 999px;
  animation: spin 0.9s linear infinite;
  display: none;
}
.pdf-stage.loading .pdf-spinner { display: block; }
.pdf-stage.loading img { opacity: 0.3; }

/* ── responsive ─────────────────────────────────────────────────────── */
@media (max-width: 960px) {
  .page {
    margin-inline-start: var(--s-6);
    margin-inline-end: var(--s-6);
    max-width: none;
  }
  .tooltip {
    inset-inline-start: 0; inset-inline-end: auto;
    inset-block-start: calc(100% + 8px);
    width: 100%; max-width: 100%;
    transform: translateY(-4px);
  }
  .tooltip::after { display: none; }
  .card:hover .tooltip, .card:focus-within .tooltip,
  .tooltip:hover {
    transform: translateY(0);
  }
}
@media (max-width: 640px) {
  .page { padding-block-start: var(--s-6); }
  h1 { font-size: var(--fs-2xl); }
  .card { grid-template-columns: auto 1fr; }
  .card .score { grid-column: 1 / -1; flex-direction: row; justify-content: flex-end; gap: var(--s-2); }
  .searchbar { flex-direction: column; padding: var(--s-3); }
  .searchbar .icon { display: none; }
  #q { padding: var(--s-3); }
  .btn { justify-content: center; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0ms !important; animation-duration: 0ms !important; }
}
</style>
</head>
<body>

<main class="page">
  <header class="hero">
    <span class="eyebrow"><span class="dot"></span>LLM 篩選 · {{ llm }}</span>
    <h1>舞光 LED 產品型錄查詢</h1>
    <p class="sub">
      輸入需求，系統依序通過 <code>BAAI/bge-m3</code> + BM25 hybrid 檢索、
      <code>bge-reranker-v2-m3</code> cross-encoder 重排，最後由
      <code>{{ llm }}</code> 從 20 個候選中挑出「★ 推薦 + 4 備選」並附說明。
    </p>
  </header>

  <section class="searchbar" role="search">
    <span class="icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    </span>
    <input id="q" type="text" autocomplete="off" spellcheck="false"
           placeholder="例：40W 以下、4000K、IP65 防水的崁燈"
           onkeydown="if(event.key==='Enter')go()">
    <button id="btn" class="btn" type="button" onclick="go()">
      搜尋
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
    </button>
  </section>

  <div class="examples">
    <span class="label">快速範例：</span>
    <button class="chip" type="button" onclick="fill('40W 以下 4000K IP65 防水崁燈')">防水崁燈</button>
    <button class="chip" type="button" onclick="fill('辦公室用 30W 5700K 輕鋼架燈')">辦公室輕鋼架</button>
    <button class="chip" type="button" onclick="fill('戶外景觀 50W 3000K 投射燈')">戶外投射燈</button>
    <button class="chip" type="button" onclick="fill('停車場 80W 吊管工事燈')">工事燈</button>
  </div>

  <div id="out" aria-live="polite">
    <div class="placeholder">輸入需求並送出，即可取得 5 款推薦與 1 項「無匹配」選項。</div>
  </div>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- PDF page viewer modal -->
<div id="pdfModal" class="pdf-modal" role="dialog" aria-modal="true" aria-label="型錄頁面預覽"
     onclick="if(event.target===this)closePdf()">
  <div class="pdf-modal-inner">
    <div class="pdf-toolbar">
      <div class="pdf-toolbar-group">
        <button class="pdf-nav" type="button" onclick="pdfNav(-1)" id="pdfPrev" aria-label="上一頁">‹</button>
        <span class="pdf-pageno">
          p.<input type="number" id="pdfPageInput" min="1" onchange="pdfGoto(this.valueAsNumber)">
          / <span id="pdfTotal">—</span>
        </span>
        <button class="pdf-nav" type="button" onclick="pdfNav(1)" id="pdfNext" aria-label="下一頁">›</button>
      </div>
      <button class="pdf-close" type="button" onclick="closePdf()" aria-label="關閉">✕</button>
    </div>
    <div class="pdf-stage" id="pdfStage">
      <div class="pdf-spinner"></div>
      <img id="pdfImg" alt="" loading="eager">
    </div>
  </div>
</div>

<script>
function fill(s) {
  const q = document.getElementById('q');
  q.value = s; q.focus(); go();
}

async function go() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const out = document.getElementById('out');
  const btn = document.getElementById('btn');
  btn.disabled = true;
  out.innerHTML = '<div class="loading">搜尋中… 檢索 + GPT-4o 篩選約 3–8 秒</div>';
  try {
    const r = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: q}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
    lastQueryId = data.query_id || null;
    lastElapsedMs = data.elapsed_ms || 0;
    render(data.results || []);
  } catch (e) {
    out.innerHTML = '<div class="error">錯誤：' + escapeHtml(e.message) + '</div>';
  } finally {
    btn.disabled = false;
  }
}

let lastQueryId = null;
let lastElapsedMs = 0;

function sendFeedback(kind, payload) {
  if (!lastQueryId) return;
  fetch('/api/feedback', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query_id: lastQueryId, kind, payload}),
  }).catch(() => {});
}

function render(results) {
  const out = document.getElementById('out');
  if (!results.length) {
    out.innerHTML = '<div class="error">沒有結果</div>';
    return;
  }
  const parts = ['<div class="results">'];
  results.forEach((r, i) => {
    const rec = i === 0;
    const rank = r.rank_label || (rec ? '★ 推薦' : '備選 ' + i);
    const safeRank = escapeHtml(rank).replace(/\s+/g, '&nbsp;');
    parts.push(`<article class="card ${rec ? 'recommended' : ''}" tabindex="0"`);
    parts.push(` onclick="pickCard(${i}, ${JSON.stringify(rank).replace(/"/g, '&quot;')}, ${r.page})"`);
    parts.push(' onkeydown="if(event.key===\'Enter\')this.click()">');
    parts.push(`<span class="rank">${safeRank}</span>`);
    parts.push('<div class="body">');
    parts.push(`<div class="title">${escapeHtml(r.name || '型錄 p.' + r.page)}</div>`);
    if (r.reason) {
      parts.push(`<div class="reason">${escapeHtml(r.reason)}</div>`);
    }
    parts.push('<div class="meta">');
    parts.push(`<span class="pill">p.${r.page}</span>`);
    if (r.category) parts.push(`<span class="pill">${escapeHtml(r.category)}</span>`);
    if (r.wattages) parts.push(`<span class="pill">${escapeHtml(r.wattages)}W</span>`);
    if (r.color_temps) parts.push(`<span class="pill">${escapeHtml(r.color_temps)}K</span>`);
    if (r.ip_rating) parts.push(`<span class="pill">IP${escapeHtml(r.ip_rating)}</span>`);
    parts.push('</div>');
    if (r.models) parts.push(modelsRow(r.models, 6));
    parts.push('</div>');
    parts.push(`<div class="score"><b>推薦理由</b><span class="hint">滑鼠移上看規格</span></div>`);

    parts.push('<aside class="tooltip" role="tooltip">');
    parts.push('<h3>產品規格</h3>');
    parts.push('<dl class="spec-grid">');
    parts.push(specRow('LLM 推薦理由', r.reason));
    parts.push(specRow('頁數', 'p.' + r.page));
    parts.push(specRow('類別', r.category));
    parts.push(specModelRow('型號 (ID)', r.models));
    parts.push(specRow('瓦數', r.wattages ? r.wattages + ' W' : ''));
    parts.push(specRow('色溫', r.color_temps ? r.color_temps + ' K' : ''));
    parts.push(specRow('光通量', r.lumens ? r.lumens + ' LM' : ''));
    parts.push(specRow('IP 防護', r.ip_rating ? 'IP' + r.ip_rating : ''));
    parts.push(specRow('特色', r.features));
    parts.push('</dl>');
    parts.push('<figure>');
    parts.push(`<img loading="lazy" src="/api/page_image/${r.page}.png" alt="型錄第 ${r.page} 頁預覽" onclick="event.stopPropagation();openPdf(${r.page})">`);
    parts.push(`<figcaption>點圖放大瀏覽型錄 · p.${r.page}</figcaption>`);
    parts.push('</figure>');
    parts.push('</aside>');
    parts.push('</article>');
  });
  parts.push(
    '<article class="card nomatch" tabindex="0" onclick="noMatch()" onkeydown="if(event.key===\'Enter\')noMatch()">',
    '<span class="rank">無匹配</span>',
    '<div class="body">',
    '<div class="title">以上皆非 — 沒有符合需求的產品</div>',
    '<div class="meta"><span>若 5 項結果皆不合適，點此回報。已記錄,有助改善排序。</span></div>',
    '</div>',
    '<div class="score"><b>—</b><span>回報</span></div>',
    '</article>'
  );
  parts.push('</div>');
  if (lastElapsedMs) {
    parts.push(`<div style="text-align:center;margin-top:12px;color:var(--c-ink-400);font-size:var(--fs-xs)">查詢耗時 ${lastElapsedMs} ms · query_id #${lastQueryId ?? '—'}</div>`);
  }
  out.innerHTML = parts.join('');
}

function pickCard(idx, rank, page) {
  sendFeedback('click', {idx, rank, page});
}

/* ── PDF viewer modal ───────────────────────────────────────── */
let pdfTotalPages = null;
let pdfCurrentPage = 1;
const PDF_MODAL_DPI = 180;

async function ensurePdfMeta() {
  if (pdfTotalPages !== null) return;
  try {
    const r = await fetch('/api/pdf_meta');
    const d = await r.json();
    pdfTotalPages = d.total_pages || 1;
    document.getElementById('pdfTotal').textContent = pdfTotalPages;
    document.getElementById('pdfPageInput').max = pdfTotalPages;
  } catch {
    pdfTotalPages = 999;
  }
}

async function openPdf(page) {
  await ensurePdfMeta();
  pdfCurrentPage = Math.max(1, Math.min(pdfTotalPages, page | 0 || 1));
  const modal = document.getElementById('pdfModal');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  renderPdfPage();
}

function closePdf() {
  document.getElementById('pdfModal').classList.remove('show');
  document.body.style.overflow = '';
}

function pdfNav(delta) {
  pdfGoto(pdfCurrentPage + delta);
}

function pdfGoto(page) {
  if (!pdfTotalPages) return;
  page = Math.max(1, Math.min(pdfTotalPages, page | 0));
  if (page === pdfCurrentPage) return;
  pdfCurrentPage = page;
  renderPdfPage();
}

function renderPdfPage() {
  const stage = document.getElementById('pdfStage');
  const img = document.getElementById('pdfImg');
  const input = document.getElementById('pdfPageInput');
  const prev = document.getElementById('pdfPrev');
  const next = document.getElementById('pdfNext');

  input.value = pdfCurrentPage;
  prev.disabled = pdfCurrentPage <= 1;
  next.disabled = pdfTotalPages != null && pdfCurrentPage >= pdfTotalPages;

  stage.classList.add('loading');
  img.alt = `型錄第 ${pdfCurrentPage} 頁`;
  img.onload = () => stage.classList.remove('loading');
  img.onerror = () => stage.classList.remove('loading');
  img.src = `/api/page_image/${pdfCurrentPage}.png?dpi=${PDF_MODAL_DPI}`;
}

document.addEventListener('keydown', (e) => {
  const modal = document.getElementById('pdfModal');
  if (!modal.classList.contains('show')) return;
  if (e.key === 'Escape') { closePdf(); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { pdfNav(-1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { pdfNav(1); e.preventDefault(); }
});

function specRow(label, value) {
  if (value === null || value === undefined || value === '') return '';
  return `<dt>${escapeHtml(label)}</dt><dd>${escapeHtml(String(value))}</dd>`;
}

function specModelRow(label, csv) {
  if (!csv) return '';
  const pills = String(csv).split(',')
    .map(s => s.trim()).filter(Boolean)
    .map(m => `<span class="model-pill">${escapeHtml(m)}</span>`)
    .join('');
  return `<dt>${escapeHtml(label)}</dt><dd><div class="model-list">${pills}</div></dd>`;
}

function modelsRow(csv, maxVisible) {
  const items = String(csv).split(',').map(s => s.trim()).filter(Boolean);
  if (!items.length) return '';
  const head = items.slice(0, maxVisible)
    .map(m => `<span class="model-pill">${escapeHtml(m)}</span>`).join('');
  const more = items.length > maxVisible
    ? `<span class="more">+${items.length - maxVisible} 更多</span>` : '';
  return `<div class="models-row"><span class="k">型號</span>${head}${more}</div>`;
}

function noMatch() {
  sendFeedback('no_match', null);
  const t = document.getElementById('toast');
  t.textContent = '已記錄本次查詢為「無匹配產品」';
  t.classList.add('show');
  clearTimeout(noMatch._h);
  noMatch._h = setTimeout(() => t.classList.remove('show'), 2200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>
</body>
</html>
